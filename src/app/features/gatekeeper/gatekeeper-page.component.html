<header class="gk-header">
  <div class="gk-header__intro">
    <h1 class="gk-header__title">Gatekeeper</h1>
    <p class="gk-header__subtitle">
      HTF context → 15m execution — Location, Behavior, Confirmation, Invalidation
    </p>
  </div>
</header>

<p-message
  severity="warn"
  icon="pi pi-shield"
  text="The level is not the trade. First test = context. Retest = execution."
  styleClass="gk-oath"
/>

<p-toast position="top-right" />

<div class="gk-layout">
  <section class="gk-layout__wizard">
    <app-gatekeeper-wizard #wizard (pillarsChange)="onPillarsChange($event)" />
  </section>

  <aside class="gk-layout__rail">
    <app-readiness-meter
      [compact]="true"
      [pillarSteps]="pillarSteps()"
      [isRetest]="isRetest()"
    />

    <app-execution-block
      #execution
      [pillarsQualified]="pillarsQualified()"
      [readinessPct]="readinessPct()"
      [auditDraft]="qualifiedFormValue()"
      (tradeSubmitted)="onTradeSubmitted($event)"
    />
  </aside>
</div>
