<div class="journal-progress">
  <div class="journal-progress__summary">
    <span class="journal-progress__count">
      {{ progress().completedCount }} of {{ progress().totalSteps }} steps complete
    </span>
    <span class="journal-progress__pct data-mono">{{ progress().progressPct }}%</span>
  </div>

  <p-progressBar
    [value]="progress().progressPct"
    [showValue]="false"
    styleClass="journal-progress__bar"
  />

  <div class="journal-progress__legend" aria-hidden="true">
    <span class="journal-progress__legend-item journal-progress__legend-item--done">Done</span>
    <span class="journal-progress__legend-item journal-progress__legend-item--active">Current</span>
    <span class="journal-progress__legend-item journal-progress__legend-item--todo">To do</span>
  </div>

  <ol class="journal-progress__steps" aria-label="Gatekeeper step completion">
    @for (step of progress().steps; track step.number) {
      <li
        class="journal-progress__step"
        [class.journal-progress__step--done]="step.complete"
        [class.journal-progress__step--active]="step.current"
        [class.journal-progress__step--todo]="!step.complete && !step.current"
        [attr.aria-label]="
          'Step ' +
          step.number +
          ': ' +
          step.label +
          (step.complete ? ', complete' : step.current ? ', current' : ', not complete')
        "
        [pTooltip]="'Step ' + step.number + ': ' + step.label"
        tooltipPosition="top"
      >
        <span class="journal-progress__step-head">
          <span class="journal-progress__step-num">{{ step.number }}</span>
          @if (step.complete) {
            <span class="journal-progress__step-check" aria-hidden="true">
              <i class="pi pi-check"></i>
            </span>
          }
        </span>
        <span class="journal-progress__step-label">{{ step.label }}</span>
      </li>
    }
  </ol>
</div>
