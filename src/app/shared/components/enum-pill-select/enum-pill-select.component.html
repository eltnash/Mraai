<div class="enum-pill-select" role="radiogroup" [attr.aria-label]="ariaLabel()">
  @for (option of options(); track option.value) {
    <button
      type="button"
      class="enum-pill-select__pill"
      role="radio"
      [attr.aria-checked]="value === option.value"
      [class.enum-pill-select__pill--selected]="value === option.value"
      [disabled]="disabled"
      (click)="select(option.value)"
    >
      {{ option.label }}
    </button>
  }
</div>
